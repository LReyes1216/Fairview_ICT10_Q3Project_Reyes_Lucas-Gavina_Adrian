                <label for="name" style="font-family: Arial; font-weight: bold; font-size: 20px;">Name:</label>

                <br>
                <h5>Are you done with the online registration?</h5>

                <label for="ryes">Yes</label>
                <input type="radio" class="form-input" name="registration" id="ryes">
                
                <label for="rno">No</label>
                <input type="radio" class="form-input" name="registration" id="rno">

                <input type="radio" class="form-input" name="medical" id="myes">
                
                <label for="mno">No</label>
                <input type="radio" class="form-input" name="medical" id="mno">
                
                <br><br>
                <h5>What's your Grade & Section?</h5>
                <select id="level" class="form-select" style="width: 200px; margin: auto;">
                    <option value="" selected disabled>Select Level</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>

                <br>
                <select id="section" class="form-select" style="width: 200px; margin: auto;">

                    <option value="Emerald">Emerald</option>
                    <option value="Ruby">Ruby</option>
                    <option value="Sapphire">Sapphire</option>
                    <option value="Topaz">Topaz</option>
                    <option value="Jade">Jade</option>

                    <option value="Amorsolo">Amorsolo</option>
                    <option value="Jose">Jose</option>
                    <option value="Tinio">Tinio</option>
                </select>
